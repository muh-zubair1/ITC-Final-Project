<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cricket Players Dashboard</title>

  <script src="https://cdn.tailwindcss.com"></script>

  <script>
    // 1. Search Function
    function getSearch() {
      const searchTerm = document.querySelector("#search").value.toLowerCase();
      if (searchTerm.length > 2) {
        fetch("/api/players/search", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ query: searchTerm }), // matches the 'query' key in main.py
        })
          .then(res => res.json())
          .then(players => renderTable(players));
      } else if (searchTerm.length === 0) {
        fetchPlayers();
      }
    }

    // 2. Save/Update Function
    function handleSave() {
      const updated_player = {
        "playerid": document.querySelector("#playerid_input").value,
        "title": document.querySelector("#title_input").value,
        "highest score": document.querySelector("#score_input").value, // Key with space
      };

      fetch("/api/players/save", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(updated_player),
      })
        .then(res => res.json())
        .then(() => {
          document.querySelector("#editBox").classList.add("hidden");
          fetchPlayers(); // Refresh table
        });
    }

    // 3. Load single player into Edit Panel
    function handleClick(id) {
      fetch(`/api/players/${id}`)
        .then(res => res.json())
        .then(data => {
          document.querySelector("#editBox").classList.remove("hidden");
          document.querySelector("#editTable tbody").innerHTML = `
            <tr>
                <td class="font-semibold py-2">Player ID</td>
                <td>
                  ${data.playerid}
                  <input type="hidden" id="playerid_input" value="${data.playerid}">
                </td>
            </tr>
            <tr>
                <td class="font-semibold py-2">Player Info</td>
                <td>
                  <textarea id="title_input" class="w-full p-2 rounded bg-gray-100 text-black text-sm">${data.title}</textarea>
                </td>
            </tr>
            <tr>
                <td class="font-semibold py-2">High Score</td>
                <td>
                  <input id="score_input" class="w-full p-2 rounded bg-gray-100 text-black" value="${data['highest score']}">
                </td>
            </tr>
            <tr>
                <td colspan="2" class="text-right pt-4">
                  <button onclick="handleSave()" class="bg-emerald-500 text-white px-5 py-2 rounded-lg shadow hover:bg-emerald-600 transition">
                      Save Changes
                  </button>
                </td>
            </tr>
            `;
        });
    }

    // 4. Render main table
    function renderTable(players) {
      let html = "";
      players.forEach(player => {
        html += `
          <tr class="hover:bg-indigo-50 border-b transition text-gray-700">
            <td class="p-4 text-sm">${player.playerid}</td>
            <td class="p-4 font-medium text-indigo-600 cursor-pointer hover:underline" onclick="handleClick(${player.playerid})">
              ${player.title}
            </td>
            <td class="p-4 text-center font-bold text-gray-600">${player['highest score']}</td>
          </tr>
        `;
      });
      document.querySelector("#playersBody").innerHTML = html;
      document.querySelector("#count").innerText = players.length;
    }

    // 5. Initial fetch
    function fetchPlayers() {
      fetch("/api/players")
        .then(res => res.json())
        .then(data => renderTable(data));
    }

    window.onload = fetchPlayers;
  </script>
</head>

<body class="bg-gradient-to-br from-slate-900 to-indigo-900 min-h-screen text-white font-sans">

  <header class="p-8 text-center">
    <h1 class="text-4xl font-extrabold tracking-tight">🏏 Cricket Players Dashboard</h1>
    <p class="text-indigo-200 mt-2 opacity-80">Final Project: Player Records Management</p>
  </header>

  <div class="max-w-6xl mx-auto px-6 grid grid-cols-1 md:grid-cols-4 gap-4 mb-8">
    <div class="bg-white/10 border border-white/20 backdrop-blur-md rounded-2xl p-4 flex flex-col justify-center items-center">
      <span class="text-xs uppercase tracking-widest text-indigo-300">Total Records</span>
      <span id="count" class="text-3xl font-black text-emerald-400">0</span>
    </div>
    <div class="md:col-span-3">
      <input
        id="search"
        type="text"
        placeholder="Search by name, country, or role (e.g. 'Pakistan' or 'Bowler')..."
        oninput="getSearch()"
        class="w-full h-full p-4 rounded-2xl bg-white/10 border border-white/20 backdrop-blur-md text-white placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-emerald-400 transition"
      />
    </div>
  </div>

  <main class="max-w-6xl mx-auto px-6 grid grid-cols-1 lg:grid-cols-3 gap-8 pb-12">

    <div class="lg:col-span-2 bg-white rounded-2xl shadow-2xl overflow-hidden border border-gray-200">
      <div class="overflow-x-auto">
        <table class="w-full text-left">
          <thead class="bg-gray-50 border-b border-gray-200">
            <tr>
              <th class="p-4 text-xs font-semibold text-gray-500 uppercase tracking-wider">ID</th>
              <th class="p-4 text-xs font-semibold text-gray-500 uppercase tracking-wider">Player / Team / Role</th>
              <th class="p-4 text-xs font-semibold text-gray-500 uppercase tracking-wider text-center">High Score</th>
            </tr>
          </thead>
          <tbody id="playersBody" class="divide-y divide-gray-100">
            </tbody>
        </table>
      </div>
    </div>

    <aside>
      <div id="editBox" class="hidden sticky top-8 bg-white/10 border border-white/20 backdrop-blur-xl rounded-2xl p-6 shadow-xl animate-in fade-in duration-500">
        <div class="flex items-center gap-2 mb-4">
            <div class="w-3 h-3 bg-emerald-400 rounded-full animate-pulse"></div>
            <h2 class="text-xl font-bold">Edit Details</h2>
        </div>
        <table id="editTable" class="w-full">
          <tbody></tbody>
        </table>
        <button onclick="document.querySelector('#editBox').classList.add('hidden')" class="w-full mt-4 text-xs text-gray-400 hover:text-white transition">Cancel</button>
      </div>
      
      <div id="instruction" class="mt-4 p-4 border border-dashed border-white/20 rounded-xl text-center text-gray-400 text-sm">
          Click on a player's name to edit their profile information.
      </div>
    </aside>

  </main>

</body>
</html>
