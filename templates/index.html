<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Books</title>
    <style>
      * {
        font-family: Roboto, "Ubuntu Sans", Arial, sans-serif;
        font-size: 14px;
      }
      table,
      th,
      td {
        border: 1px solid black;
        border-collapse: collapse;
      }
      th,
      td {
        padding: 5px;
      }
      a:visited {
        color: blue;
      }
    </style>
    <script>
      let books = [];

      function getUpdatedBook() {
        handleSave({
          bookid: document.querySelector("#bookid").value,
          title: document.querySelector("#title").value,
          status: document.querySelector("#status").value,
        });
      }

      function handleSave(book) {
        alert(`BookId: ${book.bookid}\n Title: ${book.title}\n Status: ${book.status}`);
      }

      function handleClick(bookId) {
        // alert(bookId);
        fetch(`/api/books/${bookId}`)
          .then((response) => response.json())
          .then((data) => {
            // alert(`BookId: ${data.bookid}\nTitle: ${data.title}`);
            html = `<tr>
                        <th>BookId</th>
                        <td>
                            ${data.bookid}
                            <input type="hidden" id="bookid" value="${data.bookid}"/>
                        </td>
                    </tr>
                    <tr>
                    <th>Title</th>
                        <td>
                            <textarea id="title" rows="3" cols="30">${data.title}</textarea>
                        </td>
                    </tr>
                    <tr>
                        <th>Status</th>
                        <td>
                            <input type="text" id="status" value="${data.status}"/>
                        </td>
                    </tr>                    
                    <tr>
                        <td colspan="2">
                            <button type="submit" onclick="getUpdatedBook()">Save</button>
                        </td>
                    </tr>`;
            document.querySelector("#edit tbody").innerHTML = html;
          });
      }

      fetch("/api/books")
        .then((response) => response.json())
        .then((data) => {
          console.log(data);
          books = data;
          let html = ``;
          books.forEach((book) => {
            html += `<tr>
                        <td>${book.bookid}</td>
                        <td><a href="#!" onclick="handleClick(${book.bookid})">${book.title}</a></td>
                        <td>${book.status}</td>
                    </tr>`;
          });
          document.querySelector("tbody").innerHTML = html;
        });
    </script>
  </head>
  <body>
    <div style="display: flex">
      <div>
        <h2>Books</h2>
        <table>
          <thead>
            <tr>
              <th>Id</th>
              <th>Title</th>
              <th>Status</th>
            </tr>
          </thead>
          <tbody></tbody>
        </table>
      </div>
      <div>
        <h2>Edit</h2>

        <table id="edit">
          <tbody></tbody>
        </table>
      </div>
    </div>
  </body>
</html>
